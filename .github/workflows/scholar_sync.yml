# .github/workflows/scholar_sync.yml
#
# Automatically syncs new papers from Google Scholar.
#
# What it does:
#   1. Runs every Sunday at 08:00 UTC (or manually via workflow_dispatch)
#   2. Queries your Google Scholar profile using the `scholarly` Python library
#   3. Compares results against the existing _bibliography/papers.bib
#   4. If new entries are found, opens a DRAFT Pull Request with the additions
#   5. You review the PR, adjust fields if needed, then merge → site rebuilds
#
# Setup:
#   - No secrets required for public Scholar profiles
#   - The workflow uses GITHUB_TOKEN (auto-provided) to open PRs
#   - Your Scholar ID is: Ys5aNKYAAAAJ
#
# Manual run:
#   Go to Actions → Scholar Sync → Run workflow

name: Scholar Sync

on:
  schedule:
    - cron: "0 8 * * 0"   # Every Sunday at 08:00 UTC
  workflow_dispatch:       # Also runnable manually from GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install bibtexparser

      - name: Fetch new papers from Semantic Scholar
        id: fetch
        run: |
          python - <<'EOF'
          import json, os, re, sys, time
          import urllib.request
          import bibtexparser

          # Semantic Scholar author ID for Chen Hajaj (maps to Google Scholar Ys5aNKYAAAAJ)
          S2_AUTHOR_ID = "3313085"
          BIB_PATH = "_bibliography/papers.bib"
          S2_API = "https://api.semanticscholar.org/graph/v1"
          FIELDS = "title,year,authors,venue,journal,externalIds,publicationTypes"

          def s2_get(url):
              req = urllib.request.Request(url, headers={"User-Agent": "scholar-sync-bot/1.0"})
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          # Load existing bib titles
          with open(BIB_PATH, "r", encoding="utf-8") as f:
              existing_bib = bibtexparser.load(f)
          existing_keys = {e["ID"].lower() for e in existing_bib.entries}
          existing_titles = {e.get("title", "").lower().strip() for e in existing_bib.entries}

          print(f"Existing entries: {len(existing_keys)}")

          # Fetch all papers from Semantic Scholar (paginated)
          papers = []
          offset = 0
          limit = 100
          while True:
              url = (f"{S2_API}/author/{S2_AUTHOR_ID}/papers"
                     f"?fields={FIELDS}&limit={limit}&offset={offset}")
              data = s2_get(url)
              batch = data.get("data", [])
              papers.extend(batch)
              if len(batch) < limit:
                  break
              offset += limit
              time.sleep(0.5)   # stay within free-tier rate limit

          print(f"Fetched {len(papers)} papers from Semantic Scholar")

          new_entries = []
          for pub in papers:
              title = (pub.get("title") or "").strip()
              if not title or title.lower() in existing_titles:
                  continue

              year = str(pub.get("year") or "")
              authors_list = [a["name"] for a in (pub.get("authors") or [])]
              author_str = " and ".join(authors_list)

              # Determine entry type
              pub_types = pub.get("publicationTypes") or []
              is_conference = any(t in pub_types for t in ["Conference", "ConferencePaper"])
              entry_type = "inproceedings" if is_conference else "article"

              venue = pub.get("venue") or ""
              journal_info = pub.get("journal") or {}
              journal_name = journal_info.get("name") or venue

              # Generate BibTeX key: lastnameyeartitleword
              first_last = authors_list[0].split()[-1] if authors_list else "unknown"
              first_last = re.sub(r"[^a-z]", "", first_last.lower())
              title_word = re.sub(r"[^a-z]", "", title.split()[0].lower())
              key = f"{first_last}{year}{title_word}"

              # DOI / URL
              ext_ids = pub.get("externalIds") or {}
              doi = ext_ids.get("DOI", "")
              url_field = f"https://doi.org/{doi}" if doi else ""

              entry_lines = [
                  f"@{entry_type}{{{key},",
                  f"  author    = {{{author_str}}},",
                  f"  title     = {{{title}}},",
              ]
              if entry_type == "article":
                  entry_lines.append(f"  journal   = {{{journal_name}}},")
              else:
                  entry_lines.append(f"  booktitle = {{{venue}}},")
              if year:
                  entry_lines.append(f"  year      = {{{year}}},")
              if doi:
                  entry_lines.append(f"  doi       = {{{doi}}},")
              if url_field:
                  entry_lines.append(f"  url       = {{{url_field}}},")
              entry_lines.append("  selected  = {false},")
              entry_lines.append("  projects  = {},  % TODO: add project tags")
              entry_lines.append("}")

              new_entries.append("\n".join(entry_lines))
              print(f"  NEW: {title}")

          if new_entries:
              with open("new_papers.bib", "w", encoding="utf-8") as f:
                  f.write("\n\n".join(new_entries) + "\n")
              print(f"\nFound {len(new_entries)} new paper(s). Saved to new_papers.bib")
              with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
                  fh.write(f"new_count={len(new_entries)}\n")
          else:
              print("No new papers found.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
                  fh.write("new_count=0\n")
          EOF

      - name: Append new papers to papers.bib
        if: steps.fetch.outputs.new_count != '0'
        run: |
          echo "" >> _bibliography/papers.bib
          echo "% ── Auto-added by scholar_sync on $(date +%Y-%m-%d) ──────────────" >> _bibliography/papers.bib
          cat new_papers.bib >> _bibliography/papers.bib

      - name: Create Pull Request
        if: steps.fetch.outputs.new_count != '0'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: scholar-sync/auto-update
          delete-branch: true
          draft: true
          title: "📚 Scholar Sync: ${{ steps.fetch.outputs.new_count }} new paper(s) detected"
          body: |
            ## New papers found on Google Scholar

            This PR was automatically generated by the Scholar Sync workflow.

            **${{ steps.fetch.outputs.new_count }} new entries** have been appended to `_bibliography/papers.bib`.

            ### Before merging, please:
            - [ ] Review each new entry for correctness
            - [ ] Remove duplicate or incorrect entries
            - [ ] Add `selected = {true}` to any featured papers
            - [ ] Add `abstract`, `pdf`, `code`, and `projects` fields
            - [ ] Delete the `% ── Auto-added...` comment line

            Once merged, the site will rebuild automatically.
          commit-message: "chore: add ${{ steps.fetch.outputs.new_count }} new paper(s) from Scholar sync"
          labels: "papers, automated"
